services:
  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: old_school_shuffle_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  web:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_NAME: Old School Shuffle
      NEXT_PUBLIC_TAGLINE: Spin up a retro-inspired Next.js starter.
    restart: unless-stopped
